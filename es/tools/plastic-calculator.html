<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Residuos Plásticos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>🧴 Calculadora de Residuos Plásticos</h1>

<p>Plásticos de un solo uso por semana:</p>
<input type="number" id="plastic">

<button onclick="calc()">Calcular</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/es/">← Volver al inicio</a>

</div>
</div>

<script>
function calc() {
  let p = document.getElementById("plastic").value || 0;

  let monthly = p * 4;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🧴 Residuos plásticos mensuales estimados: <b>" + monthly + "</b> artículos";
}
</script>

</body>
</html>
