<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree Carbon Offset Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body class="theme-tree">

<div class="container">
<div class="card">

<h1>🌳 Tree Carbon Offset Calculator</h1>

<p>Enter number of people:</p>
<input type="number" id="people" placeholder="e.g. 4">

<button onclick="calcTree()">Calculate</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="../index.html">← Back to Home</a>

</div>
</div>

<script>
function calcTree() {
  let p = document.getElementById("people").value || 0;

  if (p <= 0) {
    alert("Please enter a valid number of people");
    return;
  }

  // 🌍 Core model (kept consistent across languages)
  let co2PerPerson = 4000; // kg/year
  let treeAbsorption = 20; // kg/year per mature tree

  let totalCO2 = p * co2PerPerson;
  let trees = Math.ceil(totalCO2 / treeAbsorption);

  // 🌳 Forest equivalence model (UX-friendly)
  let largeTrees = Math.round(trees / 3);
  let mediumTrees = Math.round(trees / 2);
  let smallTrees = trees;

  // 🌱 Emotional interpretation
  let forestType =
    trees < 50 ? "a small grove 🌱"
    : trees < 200 ? "a medium forest 🌳"
    : "a large forest 🌲";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌍 Total CO₂ footprint: <b>" + totalCO2.toLocaleString() + " kg/year</b><br>" +
    "🌳 Estimated tree offset: <b>" + trees.toLocaleString() + " trees</b><br><br>" +

    "🌱 Forest perspective: This is equivalent to " + forestType + "<br><br>" +

    "🌿 Visual breakdown (approximate):<br>" +
    "• 🌱 " + smallTrees + " small trees<br>" +
    "• 🌳 " + mediumTrees + " medium trees<br>" +
    "• 🌲 " + largeTrees + " large mature trees<br><br>" +

    "💡 Tip: Reducing transport and electricity use can significantly lower this footprint.<br><br>" +

    "📘 Next: Learn how to plant a tree effectively (coming soon)";
}
</script>

</body>
</html>
