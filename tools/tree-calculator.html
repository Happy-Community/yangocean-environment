<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree Carbon Offset Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>🌳 Tree Carbon Offset Calculator</h1>

<p>Enter number of people:</p>
<input type="number" id="people" placeholder="e.g. 4">

<button onclick="calcTree()">Calculate</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="../index.html">← Back to Home</a>

</div>
</div>

<script>
function calcTree() {
  let p = document.getElementById("people").value || 0;

  if (p <= 0) {
    alert("Please enter a valid number");
    return;
  }

  // CO2 per person per year (simplified)
  let co2PerPerson = 4000; // kg/year
  let treeAbsorption = 20; // kg/year per tree

  let totalCO2 = p * co2PerPerson;
  let trees = Math.ceil(totalCO2 / treeAbsorption);

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌍 Total CO₂ footprint: <b>" + totalCO2.toLocaleString() + " kg/year</b><br>" +
    "🌳 Trees needed to offset: <b>" + trees.toLocaleString() + "</b>";
}
</script>

</body>
</html>
